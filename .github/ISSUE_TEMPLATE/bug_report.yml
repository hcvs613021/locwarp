name: Bug 回報
description: 回報使用上遇到的問題或異常行為
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感謝您抽空回報問題。請儘可能詳細填寫以下資訊,以協助快速定位並修正。

  - type: input
    id: locwarp-version
    attributes:
      label: LocWarp 版本
      description: 可在「About」或 Release 頁面確認(例如 v0.1.16)
      placeholder: v0.1.16
    validations:
      required: true

  - type: dropdown
    id: ios-version
    attributes:
      label: iOS 版本
      options:
        - iOS 26.x
        - iOS 18.x
        - iOS 17.x
        - iOS 16.x
        - 其他(請在描述中註明)
    validations:
      required: true

  - type: input
    id: iphone-model
    attributes:
      label: iPhone 機型
      placeholder: 例如 iPhone 16 Pro Max
    validations:
      required: false

  - type: dropdown
    id: connection
    attributes:
      label: 連線方式
      options:
        - USB 有線
        - WiFi Tunnel(iOS 17+)
        - 舊版 WiFi 直連(iOS 17 以下)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 重現步驟
      description: 請依序描述如何觸發問題
      placeholder: |
        1. 開啟 LocWarp
        2. 連接 iPhone
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 預期行為
      placeholder: 描述你期待發生的結果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 實際行為
      description: 可附錯誤訊息、截圖、backend log 等
      placeholder: 描述實際發生的結果 / 錯誤訊息
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 其他補充(選填)
      description: 任何額外資訊,例如 VPN 狀態、防毒軟體、網路環境等

  - type: checkboxes
    id: pre-check
    attributes:
      label: 送出前請確認
      options:
        - label: 我已使用最新版本 LocWarp
          required: true
        - label: 我已以系統管理員身份啟動 LocWarp
          required: true
        - label: iPhone 已透過 USB 信任過此電腦
          required: true
        - label: iOS 16+ 已開啟開發人員模式
          required: true
